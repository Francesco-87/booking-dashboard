server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bookingdb
    username: bookinguser
    password: bookingpass

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true