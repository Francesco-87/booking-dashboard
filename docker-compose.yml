services:
  db:
    image: postgres:16
    container_name: booking_db
    environment:
      POSTGRES_DB: bookingdb
      POSTGRES_USER: bookinguser
      POSTGRES_PASSWORD: bookingpass
    ports:
      - "5432:5432"
    volumes:
      - booking_pgdata:/var/lib/postgresql/data

volumes:
  booking_pgdata: